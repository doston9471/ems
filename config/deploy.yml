# Name of your application. Used to uniquely configure containers.
service: ems

# Name of the container image (change to your registry path).
image: your-user/employee-management-system

# Deploy to these servers.
servers:
  web:
    - 192.168.0.1
  job:
    hosts:
      - 192.168.0.1
    cmd: bin/jobs

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# How destination host is proxied by the proxy:
proxy:
  ssl: true
  host: ems.example.com
  app_port: 80

# Credentials for your image host.
registry:
  # username: your-user
  # password:
  #   - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    RAILS_ENV: production
    SOLID_QUEUE_IN_PUMA: false
  secret:
    - RAILS_MASTER_KEY
    - EMPLOYEE_MANAGEMENT_SYSTEM_DATABASE_PASSWORD
    - SECRET_KEY_BASE

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - ems_storage:/rails/storage

asset_path: /rails/public/assets

builder:
  arch: amd64

