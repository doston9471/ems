apiVersion: v1
kind: ConfigMap
metadata:
  name: ems-config
  namespace: ems
data:
  RAILS_ENV: "production"
  RAILS_LOG_TO_STDOUT: "1"
  SOLID_QUEUE_IN_PUMA: "0"
  POSTGRES_HOST: "ems-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "employee_management_system_production"
  # Solid Cable uses a dedicated DB (see database.yml `cable:`). Ensure
  # employee_management_system_production_cable exists or point CABLE_DATABASE_URL.
  # Action Cable WebSocket path defaults to /cable behind the ingress.
