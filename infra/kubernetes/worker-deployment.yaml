apiVersion: apps/v1
kind: Deployment
metadata:
  name: ems-worker
  namespace: ems
  labels:
    app: ems-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ems-worker
  template:
    metadata:
      labels:
        app: ems-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/example/employee-management-system:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ems-config
            - secretRef:
                name: ems-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          command: ["./bin/jobs"]
