apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ems-postgres-pvc
  namespace: ems
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ems-postgres
  namespace: ems
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ems-postgres
  template:
    metadata:
      labels:
        app: ems-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: ems-config
                  key: POSTGRES_DB
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ems"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ems-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ems-postgres
  namespace: ems
spec:
  selector:
    app: ems-postgres
  ports:
    - port: 5432
      targetPort: 5432
